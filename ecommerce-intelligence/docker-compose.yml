version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: ecom_postgres
    environment:
      POSTGRES_USER: scraper_user
      POSTGRES_PASSWORD: scraper_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    container_name: ecom_scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecommerce_db
      - DB_USER=scraper_user
      - DB_PASSWORD=scraper_pass
    volumes:
      - .:/app
    command: python -m scraper.run_spiders

  dashboard:
    build: .
    container_name: ecom_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecommerce_db
      - DB_USER=scraper_user
      - DB_PASSWORD=scraper_pass
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
